name: Deploy warm.care

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      # Build frontend
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # Setup SSH
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.hetzner_deploy_ci }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 5.78.110.203 >> ~/.ssh/known_hosts 2>/dev/null

      # Deploy backend via rsync
      # .env and *.db are excluded: secrets and live database must never be overwritten by CI
      # venv is excluded: server-side virtualenv, rsync --delete would wipe it
      - name: Deploy backend
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='frontend' \
            --exclude='__pycache__' \
            --exclude='.env' \
            --exclude='*.db' \
            --exclude='*.db-shm' \
            --exclude='*.db-wal' \
            --exclude='stderr.log' \
            --exclude='venv' \
            --exclude='.venv' \
            -e "ssh -i ~/.ssh/deploy_key -p 22" \
            ./ deploy@5.78.110.203:/home/deploy/warmcare/

      # Deploy frontend to nginx webroot
      - name: Deploy frontend
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p 22" \
            frontend/dist/ deploy@5.78.110.203:/var/www/warm.care/

      # Install deps and restart service
      - name: Restart warmcare
        run: |
          ssh -i ~/.ssh/deploy_key -p 22 deploy@5.78.110.203 '
            source /home/deploy/warmcare/venv/bin/activate &&
            cd /home/deploy/warmcare &&
            pip install -q -r backend/requirements.txt &&
            sudo systemctl restart warmcare
          '

      # Verify backend is healthy
      - name: Verify health
        run: |
          ssh -i ~/.ssh/deploy_key -p 22 deploy@5.78.110.203 '
            sleep 3
            status=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8002/api/health)
            if [ "$status" != "200" ]; then
              echo "ERROR: warmcare health check failed (HTTP $status)"
              exit 1
            fi
            echo "warmcare health OK (HTTP $status)"
          '
